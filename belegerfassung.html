<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Belegerfassung Maschinenring</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #83B735;
    --green-dark: #2F5D2F;
    --cream: #FCFAF5;
    --line: #E3E0D6;
    --text: #263427;
    --muted: #7A8577;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, Segoe UI, Arial, sans-serif;
    background: var(--cream);
    margin: 0;
    padding: 28px 16px;
    color: var(--text);
  }
  .wrap { max-width: 1180px; margin: 0 auto; }

  .head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 22px;
  }
  .head h1 {
    font-size: 22px;
    font-weight: 800;
    color: var(--green-dark);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .head span {
    display: block;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--muted);
    margin-top: 2px;
  }
  .toolbar { display: flex; gap: 10px; }
  button {
    font-family: inherit;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .08s ease, background .15s ease;
  }
  button:active { transform: scale(0.97); }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-secondary { background: #fff; color: var(--green-dark); border: 1.5px solid var(--line); }
  .btn-secondary:hover { border-color: var(--green); }

  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px 16px;
    margin-bottom: 14px;
    box-shadow: 0 1px 2px rgba(47,93,47,0.04);
    position: relative;
  }
  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .beleg-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--green-dark);
    color: #fff;
    font-weight: 700;
    font-size: 12.5px;
    padding: 5px 12px 5px 10px;
    border-radius: 999px;
  }
  .beleg-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

  .del {
    background: none;
    border: none;
    color: #B94A3B;
    font-size: 12.5px;
    font-weight: 600;
    padding: 4px 6px;
    cursor: pointer;
    border-radius: 6px;
  }
  .del:hover { background: #fdeceb; }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px 16px;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.span2 { grid-column: span 2; }
  label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
  }
  input, select {
    font-family: inherit;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13.5px;
    color: var(--text);
    background: var(--cream);
    width: 100%;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--green);
    background: #fff;
  }
  .num { text-align: right; }
  .check-field {
    flex-direction: row;
    align-items: center;
    gap: 8px;
    padding-top: 20px;
  }
  input[type=checkbox] {
    width: 17px; height: 17px; accent-color: var(--green); cursor: pointer;
  }
  .check-field label { text-transform: none; font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0; }

  .summary {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 14px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 20px;
    margin-top: 6px;
  }
  .summary .label { font-size: 13px; font-weight: 600; color: var(--muted); }
  .summary .value { font-size: 22px; font-weight: 800; color: var(--green-dark); }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
    padding: 40px 0;
    border: 1.5px dashed var(--line);
    border-radius: 14px;
  }

  @media (max-width: 820px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .field.span2 { grid-column: span 2; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <div>
      <h1>Belegerfassung</h1>
      <span>Maschinenring &middot; laufende Erfassung</span>
    </div>
    <div class="toolbar">
      <button class="btn-secondary" onclick="exportCSV()">CSV exportieren</button>
      <button class="btn-primary" onclick="addBeleg()">+ Neuer Beleg</button>
    </div>
  </div>

  <div id="list"></div>
  <div id="emptyState" class="empty" style="display:none;">Noch kein Beleg erfasst — leg mit „+ Neuer Beleg" los.</div>

  <div class="summary">
    <span class="label">Gesamtsumme</span>
    <span class="value" id="gesamtsumme">0,00 €</span>
  </div>

</div>

<script>
let counter = 0;

function addBeleg() {
  counter++;
  const list = document.getElementById('list');
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = counter;
  card.innerHTML = `
    <div class="card-top">
      <span class="beleg-badge"><span class="dot"></span>Beleg Nr. ${counter}</span>
      <button class="del" onclick="delCard(this)">Löschen ✕</button>
    </div>
    <div class="grid">
      <div class="field">
        <label>Auftraggeber (AG)</label>
        <input type="text" class="ag" placeholder="Name / Mitglied">
      </div>
      <div class="field">
        <label>Auftragnehmer (AN)</label>
        <input type="text" class="an" placeholder="Name / Mitglied">
      </div>
      <div class="field">
        <label>Leistungsdatum</label>
        <input type="date" class="datum">
      </div>
      <div class="field">
        <label>VSKZ-Nr.</label>
        <input type="text" class="vskz" placeholder="VSKZ-Nr.">
      </div>
      <div class="field span2">
        <label>Leistung</label>
        <input type="text" class="leistung" placeholder="z. B. Häckseln, Mähen, Transport ...">
      </div>
      <div class="field">
        <label>Umfang</label>
        <input type="number" step="0.01" class="umfang" oninput="calc(this)" placeholder="Menge / Std.">
      </div>
      <div class="field">
        <label>Einzelpreis (€)</label>
        <input type="number" step="0.01" class="einzelpreis num" oninput="calc(this)" placeholder="0,00">
      </div>
      <div class="field">
        <label>Gesamtpreis (€)</label>
        <input type="number" step="0.01" class="gesamtpreis num" oninput="calcBack(this)" placeholder="0,00">
      </div>
      <div class="field check-field">
        <input type="checkbox" class="agtank" id="agtank-${counter}">
        <label for="agtank-${counter}">AG getankt</label>
      </div>
    </div>
  `;
  list.appendChild(card);
  updateEmptyState();
}

function calc(el) {
  const card = el.closest('.card');
  const umfang = parseFloat(card.querySelector('.umfang').value) || 0;
  const einzel = parseFloat(card.querySelector('.einzelpreis').value) || 0;
  if (umfang && einzel) {
    card.querySelector('.gesamtpreis').value = (umfang * einzel).toFixed(2);
  }
  updateSum();
}

function calcBack(el) {
  const card = el.closest('.card');
  const umfang = parseFloat(card.querySelector('.umfang').value) || 0;
  const gesamt = parseFloat(card.querySelector('.gesamtpreis').value) || 0;
  if (umfang && gesamt) {
    card.querySelector('.einzelpreis').value = (gesamt / umfang).toFixed(2);
  }
  updateSum();
}

function updateSum() {
  let sum = 0;
  document.querySelectorAll('.gesamtpreis').forEach(f => sum += parseFloat(f.value) || 0);
  document.getElementById('gesamtsumme').textContent =
    sum.toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' €';
}

function delCard(btn) {
  btn.closest('.card').remove();
  updateSum();
  updateEmptyState();
}

function updateEmptyState() {
  const has = document.querySelectorAll('.card').length > 0;
  document.getElementById('emptyState').style.display = has ? 'none' : 'block';
}

function exportCSV() {
  const rows = [['Beleg-Nr','Auftraggeber (AG)','Auftragnehmer (AN)','Leistungsdatum','VSKZ-Nr','Leistung','Umfang','Einzelpreis','Gesamtpreis','AG getankt']];
  document.querySelectorAll('.card').forEach(card => {
    rows.push([
      card.querySelector('.beleg-badge').textContent.replace('Beleg Nr. ', ''),
      card.querySelector('.ag').value,
      card.querySelector('.an').value,
      card.querySelector('.datum').value,
      card.querySelector('.vskz').value,
      card.querySelector('.leistung').value,
      card.querySelector('.umfang').value,
      card.querySelector('.einzelpreis').value,
      card.querySelector('.gesamtpreis').value,
      card.querySelector('.agtank').checked ? 'ja' : 'nein'
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob = new Blob(['\ufeff' + csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'belege.csv';
  link.click();
}

addBeleg();
</script>
</body>
</html>
